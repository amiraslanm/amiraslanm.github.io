<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 420" role="img" aria-label="PDE classification elliptic parabolic hyperbolic">
  <rect width="860" height="420" rx="28" fill="#081425"/>
  <style>.t{font:700 24px Tahoma,Arial;fill:#fff}.s{font:16px Tahoma,Arial;fill:#a9bdd7}.f{font:19px Consolas,monospace;fill:#5eead4}</style>
  <g transform="translate(45,60)"><rect width="230" height="270" rx="24" fill="#102a4d" stroke="#ffffff24"/><text x="115" y="44" text-anchor="middle" class="t">Elliptic</text><text x="115" y="78" text-anchor="middle" class="s">تعادلی / همه جهات</text><circle cx="115" cy="160" r="70" fill="none" stroke="#5eead4" stroke-width="5"/><circle cx="115" cy="160" r="35" fill="none" stroke="#60a5fa" stroke-width="4"/><text x="115" y="248" text-anchor="middle" class="f">B²−4AC &lt; 0</text></g>
  <g transform="translate(315,60)"><rect width="230" height="270" rx="24" fill="#102a4d" stroke="#ffffff24"/><text x="115" y="44" text-anchor="middle" class="t">Parabolic</text><text x="115" y="78" text-anchor="middle" class="s">انتشار در زمان</text><path d="M50 215 C95 50 135 50 180 215" fill="none" stroke="#fbbf24" stroke-width="6"/><line x1="115" y1="82" x2="115" y2="230" stroke="#fbbf24" stroke-dasharray="8 8"/><text x="115" y="248" text-anchor="middle" class="f">B²−4AC = 0</text></g>
  <g transform="translate(585,60)"><rect width="230" height="270" rx="24" fill="#102a4d" stroke="#ffffff24"/><text x="115" y="44" text-anchor="middle" class="t">Hyperbolic</text><text x="115" y="78" text-anchor="middle" class="s">موج / مشخصه‌ها</text><path d="M70 220 L115 130 L160 220" fill="none" stroke="#fb7185" stroke-width="6"/><path d="M70 100 L115 190 L160 100" fill="none" stroke="#60a5fa" stroke-width="6"/><text x="115" y="248" text-anchor="middle" class="f">B²−4AC &gt; 0</text></g>
</svg>
