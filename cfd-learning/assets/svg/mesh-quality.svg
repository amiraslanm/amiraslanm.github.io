<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 410" role="img" aria-label="Mesh quality metrics">
  <rect width="860" height="410" rx="28" fill="#081425"/>
  <style>.t{font:700 23px Tahoma,Arial;fill:#fff}.s{font:16px Tahoma,Arial;fill:#a9bdd7}.m{font:18px Consolas,monospace;fill:#5eead4}</style>
  <g transform="translate(45,65)"><rect width="220" height="240" rx="22" fill="#102a4d" stroke="#ffffff22"/><text x="110" y="42" class="t" text-anchor="middle">Aspect Ratio</text><rect x="38" y="95" width="145" height="38" fill="none" stroke="#5eead4" stroke-width="4"/><rect x="82" y="165" width="58" height="58" fill="none" stroke="#60a5fa" stroke-width="4"/><text x="110" y="225" class="m" text-anchor="middle">AR ≈ 1 best</text></g>
  <g transform="translate(320,65)"><rect width="220" height="240" rx="22" fill="#102a4d" stroke="#ffffff22"/><text x="110" y="42" class="t" text-anchor="middle">Orthogonality</text><line x1="55" y1="175" x2="170" y2="80" stroke="#5eead4" stroke-width="5"/><line x1="55" y1="175" x2="55" y2="60" stroke="#fbbf24" stroke-width="5"/><path d="M55 130 A45 45 0 0 1 93 138" fill="none" stroke="#fff"/><text x="125" y="150" class="s">angle θ</text><text x="110" y="225" class="m" text-anchor="middle">θ → 0° ideal</text></g>
  <g transform="translate(595,65)"><rect width="220" height="240" rx="22" fill="#102a4d" stroke="#ffffff22"/><text x="110" y="42" class="t" text-anchor="middle">Skewness</text><polygon points="55,95 168,78 188,180 70,205" fill="none" stroke="#60a5fa" stroke-width="4"/><circle cx="120" cy="145" r="5" fill="#5eead4"/><circle cx="145" cy="137" r="5" fill="#fbbf24"/><line x1="120" y1="145" x2="145" y2="137" stroke="#fb7185" stroke-width="4"/><text x="110" y="225" class="m" text-anchor="middle">s small = good</text></g>
</svg>
