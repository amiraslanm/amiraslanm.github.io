  <style>.t{font:700 24px Tahoma,Arial;fill:#fff}.s{font:17px Tahoma,Arial;fill:#a9bdd7}.m{font:18px Consolas,monospace;fill:#5eead4}</style>
  <rect x="90" y="80" width="300" height="300" rx="8" fill="#102a4d" stroke="#5eead4" stroke-width="5"/>
  <path d="M110 80 H370" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/><path d="M320 55 l50 25 -50 25" fill="none" stroke="#fbbf24" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
