  <text x="470" y="165" class="m">u = ∂ψ/∂y</text><text x="470" y="205" class="m">v = −∂ψ/∂x</text><text x="470" y="260" class="m">ω = ∂v/∂x − ∂u/∂y</text><text x="470" y="315" class="m">∇²ψ = −ω</text>
